name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683       # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff        # v5
        with:
          go-version-file: go.mod
          cache: true


      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020      # v4
        with:
          node-version: 22

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9      # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32     # v2
        with:
          workspaces: examples/rust
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2

      - run: go test ./...
      - run: just build-linux-local
      - run: just build-wasm

      - name: Install wasm_exec.js
        run: |
          GO_VERSION=$(go env GOVERSION)
          curl -fsSL "https://raw.githubusercontent.com/golang/go/${GO_VERSION}/lib/wasm/wasm_exec.js" \
            -o ./build/wasm_exec.js \
            || curl -fsSL "https://raw.githubusercontent.com/golang/go/${GO_VERSION}/misc/wasm/wasm_exec.js" \
               -o ./build/wasm_exec.js

      - name: Run WASM example
        run: node ./examples/wasm/test_wasm.mjs

      - run: just build-java
      - run: just build-rust

      - name: Compile C++ example
        run: clang++ -std=c++20 -O3 ./examples/cpp/example.cpp ./build/lighter-signer-linux.so -o ./build/example-cpp

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: lighter-go-linux-wasm
          path: |
            build/lighter-signer-linux.so
            build/lighter-signer-linux.h
            build/lighter-signer.wasm
            build/wasm_exec.js

  build-darwin:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683       # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff        # v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2

      - run: just build-darwin-local

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: lighter-go-darwin
          path: build/lighter-signer-darwin-arm64.dylib